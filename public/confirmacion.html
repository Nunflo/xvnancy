<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - XV Nancy Paola</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --oro: #c5a059; --fondo: #f9f7f2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; border: 1px solid #eee; }
        h2 { color: var(--oro); margin-bottom: 15px; font-weight: 300; }
        .familiar-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #ddd; }
        .nombre { font-size: 1rem; color: #444; text-align: left; }
        .btn-enviar { background: var(--oro); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .btn-modificar { background: none; border: 1px solid var(--oro); color: var(--oro); padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%; }
        .status-badge { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; display: none; }
        #qr-container { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .pase-qr { padding: 10px; border: 1px solid #eee; border-radius: 10px; background: #fff; font-size: 11px; }
        #loader { font-style: italic; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <div id="loader">Cargando información...</div>
    
    <div id="contenido" style="display:none;">
        <h2 id="tituloFamilia"></h2>
        <div id="statusBadge" class="status-badge">✓ ASISTENCIA CONFIRMADA</div>
        
        <div id="formularioConfirmacion">
            <div id="listaIntegrantes"></div>
            <button id="btnEnviar" onclick="enviarConfirmacion()" class="btn-enviar">Guardar Confirmación</button>
        </div>

        <div id="vistaConfirmada" style="display:none;">
            <p id="resumenTexto" style="color: #666; font-size: 0.9rem;"></p>
            <div id="qr-container"></div>
            <button onclick="habilitarEdicion()" class="btn-modificar">Modificar mi respuesta</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwb8vHdnLP5jgdcBTDuwxAkRnYKmlag_IOiLEs8s1mWBypbSbqvRQuyBidD-nwj82z5wA/exec";
    const validadorURL = "https://xvnancy.vercel.app/validador.html";
    let datosGlobal = null;

    window.recibirDatos = function(data) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('contenido').style.display = 'block';
        
        if (data.error) {
            alert("Error: " + data.error);
            return;
        }

        datosGlobal = data;
        document.getElementById('tituloFamilia').innerText = "Familia " + data.familia;

        // Si ya hay algo escrito en la columna de asistencia (confirmacion)
        if (data.confirmacionAnterior && data.confirmacionAnterior !== "") {
            mostrarVistaConfirmada(data.confirmacionAnterior);
        } else {
            generarFormulario();
        }
    };

    function generarFormulario() {
        document.getElementById('vistaConfirmada').style.display = 'none';
        document.getElementById('formularioConfirmacion').style.display = 'block';
        document.getElementById('statusBadge').style.display = 'none';
        
        let html = "";
        datosGlobal.integrantes.forEach((nom, i) => {
            html += `<div class="familiar-row">
                <span class="nombre">${nom.trim()}</span>
                <select id="status-${i}">
                    <option value="Asistirá">Asistirá ✅</option>
                    <option value="No asistirá">No asistirá ❌</option>
                </select>
            </div>`;
        });
        document.getElementById('listaIntegrantes').innerHTML = html;
    }

    function mostrarVistaConfirmada(resumen) {
        document.getElementById('formularioConfirmacion').style.display = 'none';
        document.getElementById('vistaConfirmada').style.display = 'block';
        document.getElementById('statusBadge').style.display = 'block';
        document.getElementById('resumenTexto').innerText = "Tu respuesta actual: " + resumen;
        
        const qrContainer = document.getElementById('qr-container');
        qrContainer.innerHTML = "";

        // Generar QRs solo para los que dicen "Asistirá" en el resumen
        datosGlobal.integrantes.forEach((nom) => {
            if (resumen.includes(`${nom.trim()}: Asistirá`)) {
                const qrDiv = document.createElement('div');
                qrDiv.className = "pase-qr";
                qrDiv.innerHTML = `<strong>PASE</strong><br>${nom.trim()}<br><div id="qr-${nom.trim()}"></div>`;
                qrContainer.appendChild(qrDiv);

                new QRCode(document.getElementById(`qr-${nom.trim()}`), {
                    text: `${validadorURL}?id=${encodeURIComponent(nom.trim())}`,
                    width: 100, height: 100
                });
            }
        });
    }

    function habilitarEdicion() {
        if(confirm("¿Deseas cambiar tu respuesta de asistencia?")) {
            generarFormulario();
        }
    }

    function enviarConfirmacion() {
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Guardando...";
        btn.disabled = true;

        let respuestas = [];
        datosGlobal.integrantes.forEach((nom, i) => {
            respuestas.push(`${nom.trim()}: ${document.getElementById('status-'+i).value}`);
        });

        const id = new URLSearchParams(window.location.search).get('id');
        const finalResp = respuestas.join(" | ");
        
        llamarGoogle(`${scriptURL}?id=${encodeURIComponent(id)}&confirmacion=${encodeURIComponent(finalResp)}&callback=procesarGuardado`);
    }

    window.procesarGuardado = function(res) {
        if (res.estatus === "ok") {
            location.reload(); // Recargamos para que muestre los QRs actualizados
        }
    };

    window.onload = function() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (id) llamarGoogle(`${scriptURL}?id=${encodeURIComponent(id)}&callback=recibirDatos`);
    };

    function llamarGoogle(url) {
        const s = document.createElement('script');
        s.src = url;
        document.body.appendChild(s);
    }
</script>
</body>
</html>
