<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación - XV Nancy Paola</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body class="page-confirmacion">

  <div class="confirmacion-card">

    <div id="confirmacion-loader" class="confirmacion-loader">Cargando información...</div>

    <div id="confirmacion-contenido" style="display: none;">

      <h2 id="tituloFamilia"></h2>

      <div id="statusBadge" class="status-badge">✓ ASISTENCIA CONFIRMADA</div>

      <!-- Formulario de selección -->
      <div id="formularioConfirmacion">
        <div id="listaIntegrantes"></div>
        <button id="btnEnviar" class="btn-confirmacion-enviar" onclick="enviarConfirmacion()">
          Guardar Confirmación
        </button>
      </div>

      <!-- Vista confirmada con QRs -->
      <div id="vistaConfirmada" style="display: none;">
        <p id="resumenTexto" class="confirmacion-resumen"></p>
        <div id="qr-container"></div>
        <button class="btn-modificar-respuesta" onclick="habilitarEdicion()">
          Modificar mi respuesta
        </button>
      </div>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
