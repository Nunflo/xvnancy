<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - XV Nancy Paola</title>
    
    <!-- Librería externa para QR -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <!-- Enlace a tus estilos (CORREGIDO CON /) -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="card">
    <div id="loader">Cargando información...</div>
    
    <div id="contenido" style="display:none;">
        <h2 id="tituloFamilia"></h2>
        <div id="statusBadge" class="status-badge">✓ ASISTENCIA CONFIRMADA</div>
        
        <div id="formularioConfirmacion">
            <div id="listaIntegrantes"></div>
            <button id="btnEnviar" onclick="enviarConfirmacion()" class="btn-enviar">Guardar Confirmación</button>
        </div>

        <div id="vistaConfirmada" style="display:none;">
            <p id="resumenTexto" style="color: #666; font-size: 0.9rem;"></p>
            <div id="qr-container"></div>
            <button onclick="habilitarEdicion()" class="btn-modificar">Modificar mi respuesta</button>
        </div>
    </div>
</div>

<!-- Enlace a tu lógica JavaScript (CORREGIDO CON /) -->
<script src="/script.js"></script>
</body>
</html>
