<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Confirmación de Asistencia</title>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>

        :root { --oro: #c5a059; --fondo: #f9f7f2; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 450px; text-align: center; border: 1px solid #eee; }

        h2 { color: var(--oro); margin-bottom: 20px; font-weight: 300; }

        .familiar-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dashed #ddd; }

        .nombre { font-size: 1.1rem; color: #444; text-align: left; padding-right: 10px; }

        select { padding: 8px; border-radius: 8px; border: 1px solid #ccc; outline: none; background: white; }

        .btn-enviar { background: var(--oro); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 25px; transition: 0.3s; }

        .btn-enviar:disabled { background: #ccc; cursor: not-allowed; }

        #loader, #enviando { font-style: italic; color: #888; margin-top: 10px; }

        .success-msg { color: #2ecc71; font-weight: bold; display: none; margin-top: 20px; }

    </style>

</head>

<body>



<div class="card">

    <div id="loader">Buscando tu invitación...</div>

   

    <div id="contenido" style="display:none;">

        <h2 id="tituloFamilia"></h2>

        <div id="listaIntegrantes"></div>

        <div id="enviando" style="display:none;">Guardando respuesta...</div>

        <button id="btnEnviar" onclick="enviarConfirmacion()" class="btn-enviar">Confirmar Asistencia</button>

        <div id="success" class="success-msg">¡Gracias! Tu respuesta ha sido guardada.</div>


        <!-- NUEVO: Contenedor para los QRs -->
        <div id="qr-container" style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;"></div>
        <button id="btnImprimir" style="display:none; margin: 20px auto;" onclick="window.print()">Guardar Pases (PDF)</button>

    </div>



    <div id="error" style="display:none;">

        <h2>¡Ups!</h2>

        <p id="mensajeError">No pudimos conectar con la invitación.</p>

        <button onclick="location.reload()" style="background:none; border:1px solid #ccc; padding:5px 10px; cursor:pointer; border-radius:5px;">Reintentar</button>

    </div>

</div>





    <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyjedfZa1Jd9PnOiMw3ddbT0SieqHLWLBXMVD_cCsJYJq3I9tQCcOjvy9DXivyUuyR3Xg/exec";
    let datosGlobal = null;

    // URL de tu validador en Vercel
    const validadorURL = "https://xvnancy.vercel.app/validador.html";

    window.recibirDatos = function(data) {
        console.log("Respuesta de Google:", data);
        
        if (data.error) {
            showError("Invitación no encontrada. Revisa el código.");
        } else if (data.estatus === "ok") {
            document.getElementById('enviando').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            
            const qrContainer = document.getElementById('qr-container');
            qrContainer.innerHTML = ""; 
            
            let asistentesConfirmados = 0;
            const idURL = new URLSearchParams(window.location.search).get('id');

            datosGlobal.integrantes.forEach((nom, i) => {
                const status = document.getElementById(`status-${i}`).value;
                
                if (status === "Asistirá") {
                    asistentesConfirmados++;
                    
                    const qrDiv = document.createElement('div');
                    qrDiv.style.textAlign = "center";
                    qrDiv.style.padding = "10px";
                    qrDiv.style.border = "1px solid #c5a059";
                    qrDiv.style.borderRadius = "10px";
                    qrDiv.style.background = "#fff";
                    
                    // Mostramos el nombre del invitado en el pase
                    qrDiv.innerHTML = `<p style="font-size:12px; margin:0 0 8px 0; color:#444;">
                                        <strong>PASE ${asistentesConfirmados}</strong><br>${nom.trim()}
                                       </p>`;
                    
                    const qrCanvas = document.createElement('div');
                    qrDiv.appendChild(qrCanvas);
                    qrContainer.appendChild(qrDiv);

                    // CAMBIO CLAVE: El QR ahora es una URL con el ID o Nombre
                    // Esto permite que la cámara del celular lo reconozca como LINK
                    const contenidoQR = `${validadorURL}?id=${encodeURIComponent(nom.trim())}`;

                    new QRCode(qrCanvas, {
                        text: contenidoQR,
                        width: 128,
                        height: 128,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            });

            if (asistentesConfirmados > 0) {
                document.getElementById('btnImprimir').style.display = 'block';
            }
        } else {
            datosGlobal = data;
            showInvite(data);
        }
    };

    // ... Resto de tus funciones (window.onload, llamarGoogle, showInvite, etc.) se mantienen igual
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) return showError("Falta el ID en la invitación.");
        llamarGoogle(`${scriptURL}?id=${encodeURIComponent(id.toUpperCase())}&callback=recibirDatos`);
    };

    function llamarGoogle(url) {
        const script = document.createElement('script');
        script.src = url;
        script.onerror = () => showError("Error de red. Por favor, refresca la página.");
        document.body.appendChild(script);
    }

    function showInvite(data) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('contenido').style.display = 'block';
        document.getElementById('tituloFamilia').innerText = "Bienvenidos, " + data.familia;
        let html = "";
        data.integrantes.forEach((nom, i) => {
            html += `<div class="familiar-row">
                <span class="nombre">${nom.trim()}</span>
                <select id="status-${i}">
                    <option value="Asistirá">Asistirá ✅</option>
                    <option value="No asistirá">No asistirá ❌</option>
                </select>
            </div>`;
        });
        document.getElementById('listaIntegrantes').innerHTML = html;
    }

    function showError(msg) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('mensajeError').innerText = msg;
    }

    function enviarConfirmacion() {
        document.getElementById('btnEnviar').style.display = 'none';
        document.getElementById('enviando').style.display = 'block';
        let respuestas = [];
        datosGlobal.integrantes.forEach((nom, i) => {
            respuestas.push(`${nom.trim()}: ${document.getElementById('status-'+i).value}`);
        });
        const id = new URLSearchParams(window.location.search).get('id');
        llamarGoogle(`${scriptURL}?id=${encodeURIComponent(id.toUpperCase())}&confirmacion=${encodeURIComponent(respuestas.join(" | "))}&callback=recibirDatos`);
    }
</script>

</body>

</html>
