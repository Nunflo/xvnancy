<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Invitados - XV Nancy Paola</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; color: #333; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 15px; overflow: hidden; border: 2px solid #ccc; }
        .mensaje { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; font-weight: bold; font-size: 1.2rem; }
        .exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .consultando { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        button { margin-top: 25px; padding: 15px 30px; font-size: 16px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <h2>Control de Acceso - XV Nancy Paola</h2>
    <div id="reader"></div>
    <div id="status" class="mensaje"></div>
    <button onclick="location.reload()">Escanear nuevo</button>

    <script>
        const statusDiv = document.getElementById('status');
        
        // LINK ACTUALIZADO CON TU NUEVA IMPLEMENTACIÓN
        const scriptURL = "https://script.google.com/macros/s/AKfycbxr5pBVXdTzze-cBuFv0DnQZkllBFvbRfxLh44ZxbcBRvFLBBjBU4Vaj0TtBd4kSx-HZw/exec";

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.clear();
            
            let idInvitado;
            try {
                // Extrae el ID si el QR viene como URL completa, si no, toma el texto
                const url = new URL(decodedText);
                idInvitado = url.searchParams.get("id") || decodedText;
            } catch (e) {
                idInvitado = decodedText;
            }

            mostrarMensaje("Consultando lista en tiempo real...", "consultando");

            // Técnica JSONP para evitar bloqueos de seguridad (CORS)
            const finalURL = `${scriptURL}?id=${encodeURIComponent(idInvitado)}&callback=recibirRespuesta`;
            
            const script = document.createElement('script');
            script.src = finalURL;
            script.onerror = () => mostrarMensaje("Error de red: No se pudo conectar con el servidor.", "error");
            document.body.appendChild(script);
        }

        // Función que procesa la respuesta del Excel
        window.recibirRespuesta = function(data) {
            if (data.familia) {
                mostrarMensaje("✅ ACCESO PERMITIDO:<br>" + data.familia, "exito");
            } else if (data.error) {
                mostrarMensaje("❌ " + data.error, "error");
            } else {
                mostrarMensaje("❌ INVITADO NO ENCONTRADO", "error");
            }
        };

        function mostrarMensaje(texto, clase) {
            statusDiv.innerHTML = texto;
            statusDiv.className = "mensaje " + clase;
            statusDiv.style.display = "block";
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
