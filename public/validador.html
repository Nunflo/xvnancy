<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Invitados - XV Nancy Paola</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 15px; overflow: hidden; }
        .mensaje { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { margin-top: 20px; padding: 12px 24px; font-size: 16px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Control de Acceso</h2>
    <div id="reader"></div>
    <div id="status" class="mensaje"></div>
    <button onclick="location.reload()">Escanear nuevo</button>

    <script>
        const statusDiv = document.getElementById('status');

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.clear();
            
            // Extraer ID de la URL o usar el texto directo
            let idInvitado;
            try {
                const url = new URL(decodedText);
                idInvitado = url.searchParams.get("id") || decodedText;
            } catch (e) {
                idInvitado = decodedText;
            }

            mostrarMensaje("Consultando lista...", "exito");

            // Tu URL de Apps Script (Versión 15)
            const scriptURL = "https://script.google.com/macros/s/AKfycbwbusCkdG9ksX76yyLMv5TiiXhy1RFmtKUqGmBJXFIZww2sIEkZGQRKr98-Ul3wzqbUCw/exec?id=" + idInvitado;

            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    if (data.familia) {
                        mostrarMensaje("✅ ACCESO PERMITIDO: " + data.familia, "exito");
                    } else {
                        mostrarMensaje("❌ INVITADO NO ENCONTRADO", "error");
                    }
                })
                .catch(err => mostrarMensaje("Error de conexión", "error"));
        }

        function mostrarMensaje(texto, clase) {
            statusDiv.innerText = texto;
            statusDiv.className = "mensaje " + clase;
            statusDiv.style.display = "block";
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
