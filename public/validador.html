<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - XV Nancy Paola</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- El sobre -->
        <div class="envelope-wrapper" id="envelope" onclick="abrirSobre()">
            <div class="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="letter">
                    <div class="letter-content">
                        <div class="letter-header">XV</div>
                        <div class="letter-name">Nancy Paola</div>
                        <p>Te espero para celebrar juntos este momento especial.</p>
                        <button class="btn-abrir-inv" onclick="irAConfirmacion(event)">Ver Invitación</button>
                    </div>
                </div>
            </div>
        </div>
        <p class="instruccion">Toca el sobre para abrir</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
