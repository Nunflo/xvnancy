<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Invitados - XV Nancy Paola</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Desactivar fondo floral invasivo en la app de la cámara */
        body::before { 
            display: none !important; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #f4f4f9 !important; 
            color: #333 !important; 
        }
        #reader { 
            width: 100%; 
            max-width: 500px; 
            margin: auto; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #ccc; 
            background: #fff;
        }
    </style>
</head>
<body>

    <h2 class="title-serif" style="color: var(--vino); margin-bottom: 10px;">Acceso del Evento</h2>
    <p style="color: #666; margin-bottom: 20px; font-size: 0.9rem;">Coloque el código QR generado frente a la cámara</p>

    <div id="reader"></div>
    <div id="status"></div>

    <script src="js/script.js"></script>
</body>
</html>
